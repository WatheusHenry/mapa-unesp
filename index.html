<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Viewport — full native feel with notch support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Theme and status bar -->
    <meta name="theme-color" content="#0065a3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#003f6a" media="(prefers-color-scheme: dark)" />
    
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Guia UNESP" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- SEO & Description -->
    <meta name="description" content="Guia em mapa para ajudar a se localizar na UNESP Bauru, voltado para facilitar a navegação pelo campus." />
    
    <!-- Fix unpkg tracking prevention false positives -->
    <meta name="referrer" content="no-referrer" />
    
    <!-- Disable phone number detection (iOS Safari) -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/pwa-192x192.png">
    
    <!-- Apple Splash Screens (most common sizes) -->
    <!-- iPhone SE / 8 -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPhone X / XS / 11 Pro / 12 mini / 13 mini -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone XR / 11 / 12 / 13 / 14 -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 Pro / 15 / 15 Pro -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone XS Max / 11 Pro Max -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 Pro Max / 15 Plus / 15 Pro Max -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- Preconnect to critical external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://c.basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://graphhopper.com" />
    <link rel="dns-prefetch" href="https://unpkg.com" />

    <title>Guia UNESP Bauru - Mapa Interativo</title>
    
    <!-- Inline critical CSS for instant paint -->
    <style>
      /* Critical path CSS — instant loading feel */
      html, body { 
        margin: 0; padding: 0; 
        width: 100%; height: 100%;
        overflow: hidden; 
        background: #0065a3;
        -webkit-text-size-adjust: 100%;
      }
      #root { width: 100%; height: 100%; }
      /* Prevent FOUC */
      .app-container { background: #f5f5f5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
